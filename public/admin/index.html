<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>VAKHRANDI CMS</title>
    <script>window.CMS_MANUAL_INIT = true</script>
  </head>
  <body>
    <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
    <script>
      // GitHub sets COOP:same-origin which nullifies window.opener in the
      // OAuth popup. Primary fallback: the popup writes to localStorage,
      // which fires a 'storage' event in all other same-origin windows.
      window.addEventListener('storage', function(e) {
        if (e.key === 'decap_cms_auth' && e.newValue) {
          window.dispatchEvent(new MessageEvent('message', {
            data:   e.newValue,
            origin: window.location.origin,
          }))
          try { localStorage.removeItem('decap_cms_auth') } catch(ex) {}
        }
      })
      // Secondary fallback: BroadcastChannel (same session, different tab)
      try {
        new BroadcastChannel('decap_cms_auth').addEventListener('message', function(e) {
          window.dispatchEvent(new MessageEvent('message', {
            data:   e.data,
            origin: window.location.origin,
          }))
        })
      } catch(e) {}

      fetch('/admin/config.yml')
        .then(function(r) {
          if (!r.ok) throw new Error('config.yml returned ' + r.status)
          return r.text()
        })
        .then(function(yaml) {
          var config = jsyaml.load(yaml)
          config.local_backend = window.location.hostname === 'localhost'
          CMS.init({ config: config })
        })
        .catch(function(err) {
          document.body.innerHTML =
            '<p style="padding:2rem;font-family:sans-serif;color:red">CMS failed to load: ' + err.message + '</p>'
        })
    </script>
  </body>
</html>
